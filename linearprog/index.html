  <script>
    const constraintsDiv = document.getElementById("constraints");
    const var1Input = document.getElementById("var1");
    const var2Input = document.getElementById("var2");
    const addBtn = document.getElementById("addConstraintBtn");
    const step2Div = document.getElementById("step2");
    const inequalitiesBreakdownDiv = document.getElementById("inequalities-breakdown");
    const step3Div = document.getElementById("step3");
    const chartCanvas = document.getElementById('feasibleRegionChart');
    const levelSlider = document.getElementById('level-slider');
    const objAInput = document.getElementById('obj-a');
    const objBInput = document.getElementById('obj-b');
    const objCInput = document.getElementById('obj-c');
    const optimizationModeBtn = document.getElementById('optimization-mode');
    const optimizationModeToggle = document.getElementById('optimization-mode-toggle');
    const objFnNameInput = document.getElementById('obj-fn-name');
    const resetZoomBtn = document.getElementById('resetZoomBtn');
    const exercisesBtn = document.getElementById('exercisesBtn');
    const exercisesModal = document.getElementById('exercises-modal');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const summaryCard = document.getElementById('solution-summary-card');

    // Visibility state for chart elements
    const visibilityState = {
      boundaries: true,
      vertices: true, 
      contour: false,
    };

    // Make Step 2 card collapsible
    const step2Header = document.getElementById('step2-header');
    step2Header.addEventListener('click', () => {
      step2Div.classList.toggle('collapsed');
    });

    optimizationModeToggle.addEventListener('click', (e) => {
      if (e.target.classList.contains('segmented-btn')) {
        // Remove 'active' from all buttons in the group
        optimizationModeToggle.querySelectorAll('.segmented-btn').forEach(btn => btn.classList.remove('active'));
        // Add 'active' to the clicked button
        e.target.classList.add('active');
        // Re-render to find the new optimal vertex
        document.getElementById('current-exercise-display').textContent = '';
        renderConstraints();
      }
    });

    resetZoomBtn.addEventListener('click', () => {
      if (feasibleRegionChart) {
        feasibleRegionChart.resetZoom();
      }
    });

    // Add event listeners for the new chart toggles
    document.getElementById('chart-toggles').addEventListener('click', (e) => {
      if (e.target.classList.contains('chart-toggle-btn')) {
        const target = e.target.dataset.target;
        // Toggle the state
        visibilityState[target] = !visibilityState[target];
        // Toggle the 'active' class for styling
        e.target.classList.toggle('active');
        // Re-render the graph to apply visibility changes
        if (target === 'contour') {
          // Just redraw the contour line, don't re-render the whole graph
          drawContourLine(feasibleRegionChart.options.scales.x.min, feasibleRegionChart.options.scales.x.max, feasibleRegionChart.options.scales.y.min, feasibleRegionChart.options.scales.y.max);
        } else {
          renderFeasibleRegionGraph(true); // Pass true to preserve zoom
        }
      }
    });

    // --- Modal Logic ---
    exercisesBtn.addEventListener('click', () => {
      exercisesModal.style.display = 'flex';
    });

    closeModalBtn.addEventListener('click', () => {
      exercisesModal.style.display = 'none';
    });

    exercisesModal.addEventListener('click', (e) => {
      // Close if backdrop is clicked
      if (e.target === exercisesModal) {
        exercisesModal.style.display = 'none';
      }
      // If an exercise button is clicked
      if (e.target.classList.contains('exercise-item')) {
        const exerciseId = e.target.dataset.id;
        loadExercise(exerciseId);
        exercisesModal.style.display = 'none';
      }
    });

    document.addEventListener('keydown', (e) => {
      // Close modal on 'Escape' key
      if (e.key === 'Escape' && exercisesModal.style.display !== 'none') {
        exercisesModal.style.display = 'none';
      }
    });

    function formatNumber(num) {
      if (typeof num !== 'number') {
        return num;
      }
      // Check if the number is very close to an integer
      if (Math.abs(num - Math.round(num)) < 1e-9) {
        return Math.round(num).toString();
      }
      // Otherwise, format to 2 decimal places
      return num.toFixed(2);
    }

    function toSubscript(text) {
        if (!text) return '';
        // Converts q_A to qₐ, q_1 to q₁, etc.
        return text.replace(/_([A-Za-z0-9]+)/g, (match, p1) => {
            return p1.split('').map(char => {
                const subscriptMap = { '0': '₀', '1': '₁', '2': '₂', '3': '₃', '4': '₄', '5': '₅', '6': '₆', '7': '₇', '8': '₈', '9': '₉', 'A': 'ₐ', 'B': 'ₑ', 'I': 'ᵢ' }; // Add more as needed
                return subscriptMap[char] || char;
            }).join('');
        });
    }

    let constraintsList = [];
    let feasibleRegionChart;
    let staticFeasibleRegionChart;
    let step6Chart;

    function formatVar(name) {
      name = name.trim();
      if (name.includes("_")) {
        const parts = name.split("_");
        return parts[0] + "<sub>" + parts[1] + "</sub>";
      }
      return name;
    }

    function createConstraintInput(value, constraintIndex, part) {
      const input = document.createElement("input");
      input.type = "number";
      input.className = "constraint-input";
      input.value = value;
      input.onchange = (e) => {
        // When an input changes, update the model and re-render everything
        const newValue = parseFloat(e.target.value) || 0;
        constraintsList[constraintIndex][part] = newValue;
        document.getElementById('current-exercise-display').textContent = '';
        renderConstraints();
      };
      return input;
    }


    function refreshNumbers() {
      const constraintElems = constraintsDiv.querySelectorAll(".constraint");
      constraintElems.forEach((c, i) => {
        const numSpan = c.querySelector(".constraint-number");
        numSpan.textContent = `(${i + 1})`;
      });
    }

    function renderConstraints(animateLast = false) {
      constraintsDiv.innerHTML = "";
      step2Div.style.display = constraintsList.length > 0 ? "block" : "none";
      step3Div.style.display = constraintsList.length > 0 ? "block" : "none";
      resetZoomBtn.style.display = constraintsList.length > 0 ? "inline-block" : "none";

      // Update target function variable names
      const fnName = objFnNameInput.value || 'T';
      document.getElementById('obj-fn-text-1').innerHTML = `${fnName}(${formatVar(var1Input.value)}, ${formatVar(var2Input.value)}) &nbsp;=&nbsp; `;
      document.getElementById('obj-fn-text-2').innerHTML = ` ${formatVar(var1Input.value)} + `;
      document.getElementById('obj-fn-text-3').innerHTML = ` ${formatVar(var2Input.value)} + `;


      const v1 = formatVar(var1Input.value || "q_1");
      const v2 = formatVar(var2Input.value || "q_2");

      constraintsList.forEach((c, index) => {
        const div = document.createElement("div");
        div.className = "constraint";

        const numberSpan = document.createElement("span");
        numberSpan.className = "constraint-number";
        div.appendChild(numberSpan);

        const span = document.createElement("span");
        div.appendChild(span);

        // Special rendering for the first two constraints (q1 and q2 bounds)
        if (index === 0) { // Constraint for q1
          span.insertAdjacentHTML('beforeend', `${v1} `);
        } else if (index === 1) { // Constraint for q2
          span.insertAdjacentHTML('beforeend', `${v2} `);
        } else { // Standard linear combination for all other constraints
          span.appendChild(createConstraintInput(c.c1, index, 'c1'));
          span.insertAdjacentHTML('beforeend', `&nbsp;${v1} + `);

          span.appendChild(createConstraintInput(c.c2, index, 'c2'));
          span.insertAdjacentHTML('beforeend', `&nbsp;${v2} `);
        }

        // Common elements for all editable constraints: sign selector and RHS
        if (index > 1) {
          const signButton = document.createElement('button');
          signButton.className = 'constraint-sign';
          signButton.innerHTML = c.sign === 'le' ? '&le;' : '&ge;';
          signButton.onclick = () => {
              constraintsList[index].sign = constraintsList[index].sign === 'le' ? 'ge' : 'le';
              document.getElementById('current-exercise-display').textContent = '';
              renderConstraints();
          };
          span.appendChild(signButton);
        } else {
          const signSpan = document.createElement('span');
          signSpan.className = 'constraint-sign-disabled';
          signSpan.innerHTML = '&ge;';
          span.appendChild(signSpan);
        }

        span.appendChild(createConstraintInput(c.rhs, index, 'rhs'));

        // The 'remove' button logic was previously inside an 'else' block.
        // It needs to be at this level to apply correctly.
        // Note: The logic to prevent deletion of the first two constraints is already correct.
        if (index > 1) {
          // Only allow deleting constraints other than the first two (the base non-negativity constraints)
          if (index > 1) {
            const removeBtn = document.createElement("button");
            removeBtn.className = "remove-btn";
            removeBtn.innerHTML = `<i class="bi bi-trash"></i>`;
            removeBtn.onclick = () => {
              document.getElementById('current-exercise-display').textContent = '';
              constraintsList.splice(index, 1);
              renderConstraints();
            };
            div.appendChild(removeBtn);
          }
        }
        constraintsDiv.appendChild(div); // This was in the wrong place

        // Apply animation to the last element if requested
        if (animateLast && index === constraintsList.length - 1) {
          div.style.animation = `fadeInSlideDown 1s ease-out forwards`;
        }
      });

      renderInequalitiesBreakdown();
      refreshNumbers();
    }

    function renderInequalitiesBreakdown() {
      // Destroy charts before wiping the DOM so Chart.js releases the canvas
      if (staticFeasibleRegionChart) {
        staticFeasibleRegionChart.destroy();
        staticFeasibleRegionChart = null;
      }
      if (step6Chart) {
        step6Chart.destroy();
        step6Chart = null;
      }
      // Clear the breakdown div before re-rendering
      inequalitiesBreakdownDiv.innerHTML = "";

      const v1_raw = var1Input.value || "q_1";
      const v2_raw = var2Input.value || "q_2";
      const v1 = formatVar(v1_raw);
      const v2 = formatVar(v2_raw);

      // --- Create Step 1: Variables ---
      const step1Container = document.createElement('div');
      step1Container.innerHTML = `
        <h3 class="step-heading"><span class="step-num-badge">1</span> Variables</h3>
        <p class="step-subtitle">Define what each variable represents and include real-world units in actual problems.</p>
        <div class="var-display">
          <span class="var-chip">${v1}</span>
          <span class="var-chip">${v2}</span>
        </div>
      `;
      inequalitiesBreakdownDiv.appendChild(step1Container);


      // --- Create Step 2: Constraints (with full breakdown) ---
      const step2Container = document.createElement('div');
      step2Container.innerHTML = '<h3 class="step-heading"><span class="step-num-badge">2</span> Constraints</h3><p class="step-subtitle">For each constraint: find the boundary line equation, test a point, and remove the non-satisfying region. What remains across all constraints is the feasible set.</p>';

      const cardsGridContainer = document.createElement('div');
      cardsGridContainer.className = 'inequality-cards-grid';
      inequalitiesBreakdownDiv.appendChild(step2Container);
      step2Container.appendChild(cardsGridContainer);

      constraintsList.forEach((c, index) => {
        const container = document.createElement('div');
        container.className = 'inequality-card';

        const headerText = formatConstraint(c, v1, v2);

        let boundaryLineHTML = '';
        if (c.c1 === 0 && c.c2 !== 0) {
          const val = formatNumber(c.rhs / c.c2);
          boundaryLineHTML = `<strong>${v2} = ${val}</strong><div style="margin-top:4px;font-size:13px;color:#475569;">Horizontal line — ${v2} is always ${val}.</div>`;
        } else if (c.c1 !== 0 && c.c2 === 0) {
          const val = formatNumber(c.rhs / c.c1);
          boundaryLineHTML = `<strong>${v1} = ${val}</strong><div style="margin-top:4px;font-size:13px;color:#475569;">Vertical line — ${v1} is always ${val}.</div>`;
        } else {
          const terms = [];
          if (c.c1 !== 0) terms.push(c.c1 === 1 ? `1&middot;${v1}` : (c.c1 === -1 ? `-1&middot;${v1}` : `${formatNumber(c.c1)}&middot;${v1}`));
          if (c.c2 !== 0) {
            if (terms.length > 0 && c.c2 > 0) terms.push('+');
            terms.push(c.c2 === 1 ? `1&middot;${v2}` : (c.c2 === -1 ? `-1&middot;${v2}` : `${formatNumber(c.c2)}&middot;${v2}`));
          }
          const lineEq = `<strong>${terms.join(' ')} = ${formatNumber(c.rhs)}</strong>`;
          const yInt = (c.c2 !== 0) ? `<div style="margin-top:6px;">
              <span style="font-weight:600;color:#475569;font-size:12px;">Set ${v1} = 0:</span>&ensp;${formatNumber(c.c2)}&middot;${v2} = ${formatNumber(c.rhs)} &rarr; <strong>(0, ${formatNumber(c.rhs/c.c2)})</strong>
            </div>` : '';
          const xInt = (c.c1 !== 0) ? `<div style="margin-top:4px;">
              <span style="font-weight:600;color:#475569;font-size:12px;">Set ${v2} = 0:</span>&ensp;${formatNumber(c.c1)}&middot;${v1} = ${formatNumber(c.rhs)} &rarr; <strong>(${formatNumber(c.rhs/c.c1)}, 0)</strong>
            </div>` : '';
          boundaryLineHTML = `${lineEq}<div style="font-size:13px;">${xInt}${yInt}</div>`;
        }

        let testPoint = { x: 0, y: 0 };
        let testPointLabel = '(0, 0)';
        if (c.rhs === 0) { testPoint = { x: 1, y: 1 }; testPointLabel = '(1, 1)'; }

        const testVal = c.c1 * testPoint.x + c.c2 * testPoint.y;
        const testPasses = c.sign === 'le' ? (testVal <= c.rhs) : (testVal >= c.rhs);
        const signStr = c.sign === 'le' ? '≤' : '≥';
        const resultColor = testPasses ? '#16a34a' : '#dc2626';
        const resultStr = testPasses ? '✓ True' : '✗ False';
        const testPointResult = `${formatNumber(c.c1)}·${testPoint.x} + ${formatNumber(c.c2)}·${testPoint.y} ${signStr} ${formatNumber(c.rhs)} &rarr; <strong style="color:${resultColor};">${resultStr}</strong>`;

        let region;
        if (c.c1 !== 0 && c.c2 === 0) {
          const lineX = c.rhs / c.c1;
          const testSide = testPoint.x < lineX ? 'left' : 'right';
          const opp = testSide === 'left' ? 'right' : 'left';
          region = `Area to the <strong>${testPasses ? opp : testSide}</strong> of the line.`;
        } else if (c.c1 === 0 && c.c2 !== 0) {
          const lineY = c.rhs / c.c2;
          const testSide = testPoint.y < lineY ? 'below' : 'above';
          const opp = testSide === 'below' ? 'above' : 'below';
          region = `Area <strong>${testPasses ? opp : testSide}</strong> the line.`;
        } else {
          region = testPasses
            ? `Area on the side <strong>opposite</strong> the test point.`
            : `Area on the <strong>same side</strong> as the test point.`;
        }

        if (c.type === 'base') {
          if (c.text.includes("v1")) {
            boundaryLineHTML = `<strong>${v1} = 0</strong> <span style="color:#475569;">(vertical axis)</span>`;
            testPointLabel = '(1, 0)';
            region = `Area to the <strong>left</strong> of the line.`;
            const tpr = `1 ≥ 0 &rarr; <strong style="color:#16a34a;">✓ True</strong>`;
            container.innerHTML = `<div class="card-header-constraint">(${index + 1}) ${headerText}</div>
              <div class="breakdown-item"><span class="breakdown-label">Boundary</span><span class="breakdown-content">${boundaryLineHTML}</span></div>
              <div class="breakdown-item"><span class="breakdown-label">Test ${testPointLabel}</span><span class="breakdown-content">${tpr}</span></div>
              <div class="breakdown-item"><span class="breakdown-label">Remove</span><span class="breakdown-content">${region}</span></div>`;
            cardsGridContainer.appendChild(container);
            return;
          } else {
            boundaryLineHTML = `<strong>${v2} = 0</strong> <span style="color:#475569;">(horizontal axis)</span>`;
            testPointLabel = '(0, 1)';
            region = `Area <strong>below</strong> the line.`;
            const tpr = `1 ≥ 0 &rarr; <strong style="color:#16a34a;">✓ True</strong>`;
            container.innerHTML = `<div class="card-header-constraint">(${index + 1}) ${headerText}</div>
              <div class="breakdown-item"><span class="breakdown-label">Boundary</span><span class="breakdown-content">${boundaryLineHTML}</span></div>
              <div class="breakdown-item"><span class="breakdown-label">Test ${testPointLabel}</span><span class="breakdown-content">${tpr}</span></div>
              <div class="breakdown-item"><span class="breakdown-label">Remove</span><span class="breakdown-content">${region}</span></div>`;
            cardsGridContainer.appendChild(container);
            return;
          }
        }

        container.innerHTML = `<div class="card-header-constraint">(${index + 1}) ${headerText}</div>
          <div class="breakdown-item"><span class="breakdown-label">Boundary</span><span class="breakdown-content">${boundaryLineHTML}</span></div>
          <div class="breakdown-item"><span class="breakdown-label">Test ${testPointLabel}</span><span class="breakdown-content">${testPointResult}</span></div>
          <div class="breakdown-item"><span class="breakdown-label">Remove</span><span class="breakdown-content">${region}</span></div>`;
        cardsGridContainer.appendChild(container);
      });

      // --- Create Step 3: Draw Feasible Set ---
      const step3Container = document.createElement('div');
      step3Container.innerHTML = `
        <h3 class="step-heading"><span class="step-num-badge">3</span> Feasible Region</h3>
        <p class="step-subtitle">The unshaded region where all constraints hold simultaneously. The optimal solution must lie at one of its vertices.</p>
        <div class="chart-container" style="height: 400px; max-width: 550px; margin: 0 auto; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; background-color: #fff;"><canvas id="staticFeasibleRegionChart"></canvas></div>
      `;
      inequalitiesBreakdownDiv.appendChild(step3Container);

      // Now that all elements are in the DOM, render the graphs
      const fullData = renderFeasibleRegionGraph();
      renderSolutionSteps(fullData);
      updateSolutionSummary(fullData);
    }

    function renderSolutionSteps(fullData) {
      const { feasibleVertices, optimalVertexIndices, optimalValue, datasets, minX, maxX, minY, maxY } = fullData;
      const step4Container = document.createElement('div');
      step4Container.innerHTML = '<h3 class="step-heading"><span class="step-num-badge">4</span> Objective Function</h3><p class="step-subtitle">State the goal (maximize or minimize) and write the full linear target expression.</p>';

      const targetFnContainer = document.createElement('div');
      targetFnContainer.className = 'breakdown-item';

      const fnName = objFnNameInput.value || 'T';
      const a = parseFloat(objAInput.value) || 0;
      const b = parseFloat(objBInput.value) || 0;
      const c_offset = parseFloat(objCInput.value) || 0;

      // Need these for later steps
      const v1_raw = var1Input.value || "q_1";
      const v2_raw = var2Input.value || "q_2";
      const v1 = formatVar(v1_raw);
      const v2 = formatVar(v2_raw);
      let targetFnString = `${fnName}(${v1}, ${v2}) = `;
      const terms = [];
      if (a !== 0) terms.push(a === 1 ? `1&middot;${v1}` : (a === -1 ? `-1&middot;${v1}` : `${formatNumber(a)}&middot;${v1}`));
      if (b !== 0) {
          if (terms.length > 0 && b > 0) terms.push('+');
          terms.push(b === 1 ? `1&middot;${v2}` : (b === -1 ? `-1&middot;${v2}` : `${formatNumber(b)}&middot;${v2}`));
      }
      if (c_offset !== 0) {
          if (terms.length > 0 && c_offset > 0) terms.push('+');
          terms.push(formatNumber(c_offset));
      }
      if (terms.length === 0) terms.push('0');
      targetFnString += terms.join(' ');

      targetFnContainer.innerHTML = `<span class="breakdown-label">Function</span><span class="breakdown-content" style="font-size: 16px; font-family: 'IBM Plex Mono', monospace;">${targetFnString}</span>`;
      step4Container.appendChild(targetFnContainer);

      const mode = document.querySelector('#optimization-mode-toggle .segmented-btn.active').dataset.mode;
      const goalContainer = document.createElement('div');
      goalContainer.className = 'breakdown-item';
      goalContainer.innerHTML = `<span class="breakdown-label">Goal</span><span class="breakdown-content" style="font-size: 16px; text-transform: capitalize;">${mode}</span>`;
      step4Container.appendChild(goalContainer);
      inequalitiesBreakdownDiv.appendChild(step4Container);

      // --- Create Step 5: Find Contour Line Equation ---
        let levelVar = 'a'; // Default level variable
        if (v1_raw.trim().toLowerCase() === 'a' || v2_raw.trim().toLowerCase() === 'a') {
            levelVar = 'L'; // Use 'L' if 'a' is already a variable name
        }

        const initialTargetFnTerms = [];
        if (a !== 0) initialTargetFnTerms.push(a === 1 ? `1&middot;${v1}` : (a === -1 ? `-1&middot;${v1}` : `${formatNumber(a)}&middot;${v1}`));
        if (b !== 0) {
            if (initialTargetFnTerms.length > 0 && b > 0) initialTargetFnTerms.push('+');
            initialTargetFnTerms.push(b === 1 ? `1&middot;${v2}` : (b === -1 ? `-1&middot;${v2}` : `${formatNumber(b)}&middot;${v2}`));
        }
        if (c_offset !== 0) {
            if (initialTargetFnTerms.length > 0 && c_offset > 0) initialTargetFnTerms.push('+');
            initialTargetFnTerms.push(formatNumber(c_offset));
        }
        const initialTargetFnString = `${initialTargetFnTerms.join(' ')} = ${levelVar}`;

        const step5Container = document.createElement('div');
        let step5HTML = `<h3 class="step-heading"><span class="step-num-badge">5</span> Contour Line Equation</h3>
            <p class="step-subtitle">Set the objective equal to an arbitrary level '${levelVar}' and isolate ${v2} to expose the slope. All contour lines are parallel and share this slope.</p>`;

        const derivationSteps = [];

        if (b !== 0) {
            const slope_frac = `(-${formatNumber(a)} / ${formatNumber(b)})`;
            const intercept_frac = `(${levelVar} - ${formatNumber(c_offset)}) / ${formatNumber(b)}`;
            const slope_dec = formatNumber(-a / b);

            const c_offset_term_isolate = c_offset !== 0 ? ` - ${formatNumber(c_offset)}` : '';
            const c_offset_term_frac = c_offset !== 0 ? ` - ${formatNumber(c_offset)}` : '';
            const c_offset_term_dec = c_offset !== 0 ? ` - ${formatNumber(c_offset/b)}` : '';

            derivationSteps.push(`<div class="derivation-description">Start with function:</div><div class="derivation-equation">${initialTargetFnString}</div>`);
            derivationSteps.push(`<div class="derivation-description">Isolate ${v2}:</div><div class="derivation-equation">${formatNumber(b)}&middot;${v2} = -${formatNumber(a)}&middot;${v1} + ${levelVar}${c_offset_term_isolate}</div>`);
            derivationSteps.push(`<div class="derivation-description">Solve for ${v2}:</div><div class="derivation-equation">${v2} = ${slope_frac}&middot;${v1} + (${levelVar}${c_offset_term_frac}) / ${formatNumber(b)}</div>`);
            derivationSteps.push(`<div class="derivation-description">Final equation:</div><div class="derivation-equation">${v2} = ${slope_dec}&middot;${v1} + ${formatNumber(1/b)}&middot;${levelVar}${c_offset_term_dec}</div>`);

            step5HTML += `<div class="derivation-box">${derivationSteps.join('')}</div>`;
        } else if (a !== 0) { // Handle vertical contour lines
            const c_offset_term_vertical = c_offset !== 0 ? ` - ${formatNumber(c_offset)}` : '';

            derivationSteps.push(`<div class="derivation-description">Start with function:</div><div class="derivation-equation">${initialTargetFnString}</div>`);
            derivationSteps.push(`<div class="derivation-description">Solve for ${v1}:</div><div class="derivation-equation">${v1} = (${levelVar}${c_offset_term_vertical}) / ${formatNumber(a)}</div>`);
            step5HTML += `<div class="derivation-box">${derivationSteps.join('')}</div>`;
        }
        step5Container.innerHTML = step5HTML;
        inequalitiesBreakdownDiv.appendChild(step5Container);

      // --- Create Step 6: Determine Direction of Improvement ---
      const step6Container = document.createElement('div');
      let step6HTML = `<h3 class="step-heading"><span class="step-num-badge">6</span> Direction of Improvement</h3>
        <p class="step-subtitle">Pick two level values for '${levelVar}' — the minimum and maximum objective values at the feasible vertices — so both contour lines fall clearly within the graph. Graph each by finding its axis intercepts. The shift between the two lines reveals which direction to move when optimizing.</p>`;

      // Use actual objective values at the feasible vertices so sample lines are meaningful
      const allObjValsForLevel = feasibleVertices.map(v => a * v.x + b * v.y + c_offset);
      const minObjForLevel = allObjValsForLevel.length > 0 ? Math.min(...allObjValsForLevel) : 0;
      const maxObjForLevel = allObjValsForLevel.length > 0 ? Math.max(...allObjValsForLevel) : 10;
      const level1 = minObjForLevel;
      const level2 = minObjForLevel !== maxObjForLevel ? maxObjForLevel : maxObjForLevel + 10;
      let directionConclusion = '';

      const directionStepsContainer = document.createElement('div');
      directionStepsContainer.className = 'direction-step-container';

      if (b !== 0) { // Standard case with a slope
        const slope_dec = formatNumber(-a / b);
        const slope_num = -a / b;
        const int1_num = (level1 - c_offset) / b;
        const int2_num = (level2 - c_offset) / b;
        const intercept1 = formatNumber(int1_num);
        const intercept2 = formatNumber(int2_num);

        // Origin case: when intercept = 0 the line passes through (0,0) — need another point
        const isOrigin1 = Math.abs(int1_num) < 1e-9;
        const isOrigin2 = Math.abs(int2_num) < 1e-9;

        const yIntRow1 = isOrigin1
          ? `<div class="derivation-description">Through (0,0):</div>
             <div class="derivation-equation">Pick ${v1} = 1 &rarr; ${v2} = ${formatNumber(slope_num)} &rarr; point <strong>(1, ${formatNumber(slope_num)})</strong></div>`
          : `<div class="derivation-description">Set ${v1} = 0:</div>
             <div class="derivation-equation">${v1} = 0 &rarr; ${v2} = ${intercept1} &rarr; point <strong>(0, ${intercept1})</strong></div>`;
        const yIntRow2 = isOrigin2
          ? `<div class="derivation-description">Through (0,0):</div>
             <div class="derivation-equation">Pick ${v1} = 1 &rarr; ${v2} = ${formatNumber(slope_num)} &rarr; point <strong>(1, ${formatNumber(slope_num)})</strong></div>`
          : `<div class="derivation-description">Set ${v1} = 0:</div>
             <div class="derivation-equation">${v1} = 0 &rarr; ${v2} = ${intercept2} &rarr; point <strong>(0, ${intercept2})</strong></div>`;

        const xInt1Val = formatNumber(-int1_num / slope_num);
        const xInt2Val = formatNumber(-int2_num / slope_num);
        const xIntRow1 = (a !== 0 && !isOrigin1) ? `
          <div class="derivation-description">Set ${v2} = 0:</div>
          <div class="derivation-equation">${v2} = 0 &rarr; ${v1} = ${xInt1Val} &rarr; point <strong>(${xInt1Val}, 0)</strong></div>` : '';
        const xIntRow2 = (a !== 0 && !isOrigin2) ? `
          <div class="derivation-description">Set ${v2} = 0:</div>
          <div class="derivation-equation">${v2} = 0 &rarr; ${v1} = ${xInt2Val} &rarr; point <strong>(${xInt2Val}, 0)</strong></div>` : '';

        directionStepsContainer.innerHTML = `
          <div class="derivation-box">
            <div class="derivation-description">For ${levelVar} = ${formatNumber(level1)}:</div>
            <div class="derivation-equation">${v2} = ${slope_dec}&middot;${v1} + ${intercept1}</div>
            ${yIntRow1}
            ${xIntRow1}
          </div>
          <div class="derivation-box">
            <div class="derivation-description">For ${levelVar} = ${formatNumber(level2)}:</div>
            <div class="derivation-equation">${v2} = ${slope_dec}&middot;${v1} + ${intercept2}</div>
            ${yIntRow2}
            ${xIntRow2}
          </div>
        `;

        const y_intercept_change = int2_num - int1_num;
        const moveDirection = y_intercept_change > 0 ? 'up' : 'down';
        directionConclusion = `As '${levelVar}' increases from ${formatNumber(level1)} to ${formatNumber(level2)}, the y-intercept shifts ${moveDirection === 'up' ? 'from ' + intercept1 + ' to ' + intercept2 : 'from ' + intercept1 + ' to ' + intercept2}, so the line moves <strong>${moveDirection}</strong>.`;

      } else if (a !== 0) { // Vertical lines
        const x_val1 = formatNumber((level1 - c_offset) / a);
        const x_val2 = formatNumber((level2 - c_offset) / a);

        directionStepsContainer.innerHTML = `
          <div class="derivation-box">
            <div class="derivation-description">For ${levelVar} = ${formatNumber(level1)}:</div>
            <div class="derivation-equation">${v1} = ${x_val1} &nbsp;&nbsp; (vertical line)</div>
          </div>
          <div class="derivation-box">
            <div class="derivation-description">For ${levelVar} = ${formatNumber(level2)}:</div>
            <div class="derivation-equation">${v1} = ${x_val2} &nbsp;&nbsp; (vertical line)</div>
          </div>
        `;
        const x_val_change = (level2 - c_offset) / a - (level1 - c_offset) / a;
        const moveDirection = x_val_change > 0 ? 'right' : 'left';
        directionConclusion = `As '${levelVar}' increases, the vertical line moves to the <strong>${moveDirection}</strong>.`;
      } else {
        directionConclusion = `The target function is constant — its value does not change.`;
      }

      step6HTML += directionStepsContainer.outerHTML;
      step6HTML += `<p class="direction-text">${directionConclusion} To <strong>${mode}</strong>, move the contour line as far as possible in that direction while still touching the feasible region.</p>`;
      step6HTML += `<div class="chart-container" style="height: 350px; max-width: 550px; margin: 20px auto 0; padding: 10px; border: 1px solid #e5eced; border-radius: 8px; background-color: #fff;"><canvas id="step6FeasibleRegionChart"></canvas></div>`;
      step6Container.innerHTML = step6HTML;
      inequalitiesBreakdownDiv.appendChild(step6Container);

      // Render Step 6 chart: feasible set + two contour lines + optimal vertex highlighted
      const step6Canvas = document.getElementById('step6FeasibleRegionChart');
      if (step6Canvas && datasets) {
        const step6Datasets = JSON.parse(JSON.stringify(datasets)).filter(d => d.label !== 'Contour Line');

        // Use actual objective value range at vertices so contour lines are always visible
        const allObjVals = feasibleVertices.map(v => a * v.x + b * v.y + c_offset);
        const minObjVal = allObjVals.length > 0 ? Math.min(...allObjVals) : level1;
        const maxObjVal = allObjVals.length > 0 ? Math.max(...allObjVals) : level2;
        const cLevel1 = minObjVal !== maxObjVal ? minObjVal : minObjVal - 5;
        const cLevel2 = minObjVal !== maxObjVal ? maxObjVal : maxObjVal + 5;

        if (b !== 0) {
          const cSlope = -a / b;
          const cInt1 = (cLevel1 - c_offset) / b;
          const cInt2 = (cLevel2 - c_offset) / b;
          step6Datasets.push({
            label: 'Contour 1', type: 'line', fill: false, order: 3, pointRadius: 0,
            data: [{ x: minX, y: cSlope * minX + cInt1 }, { x: maxX * 1.1, y: cSlope * (maxX * 1.1) + cInt1 }],
            borderColor: 'rgba(255, 77, 0, 0.45)', borderWidth: 1.5, borderDash: [5, 4],
          });
          step6Datasets.push({
            label: 'Contour 2', type: 'line', fill: false, order: 3, pointRadius: 0,
            data: [{ x: minX, y: cSlope * minX + cInt2 }, { x: maxX * 1.1, y: cSlope * (maxX * 1.1) + cInt2 }],
            borderColor: '#ff4d00', borderWidth: 2,
          });
        } else if (a !== 0) {
          const cx1 = (cLevel1 - c_offset) / a;
          const cx2 = (cLevel2 - c_offset) / a;
          step6Datasets.push({
            label: 'Contour 1', type: 'line', fill: false, order: 3, pointRadius: 0,
            data: [{ x: cx1, y: minY }, { x: cx1, y: maxY * 1.1 }],
            borderColor: 'rgba(255, 77, 0, 0.45)', borderWidth: 1.5, borderDash: [5, 4],
          });
          step6Datasets.push({
            label: 'Contour 2', type: 'line', fill: false, order: 3, pointRadius: 0,
            data: [{ x: cx2, y: minY }, { x: cx2, y: maxY * 1.1 }],
            borderColor: '#ff4d00', borderWidth: 2,
          });
        }

        step6Chart = new Chart(step6Canvas, {
          type: 'scatter',
          data: { datasets: step6Datasets },
          options: {
            scales: {
              x: {
                type: 'linear', position: 'bottom', min: minX, max: maxX * 1.1,
                title: { display: true, text: toSubscript(var1Input.value), font: { size: 14 } },
                grid: {
                  lineWidth: (context) => (context.tick.value === 0 ? 1.5 : 1),
                  color: (context) => (context.tick.value === 0 ? 'rgba(0, 0, 0, 0.5)' : 'rgba(0, 0, 0, 0.05)'),
                },
                ticks: { callback: (value) => formatNumber(value), font: { size: 10 } }
              },
              y: {
                min: minY, max: maxY * 1.1,
                title: { display: true, text: toSubscript(var2Input.value), font: { size: 14 } },
                grid: {
                  lineWidth: (context) => (context.tick.value === 0 ? 1.5 : 1),
                  color: (context) => (context.tick.value === 0 ? 'rgba(0, 0, 0, 0.5)' : 'rgba(0, 0, 0, 0.05)'),
                },
                ticks: { callback: (value) => formatNumber(value), font: { size: 10 } }
              }
            },
            plugins: {
              zoom: { zoom: { wheel: { enabled: false } }, pan: { enabled: false } },
              legend: { display: false },
              tooltip: { enabled: false },
              afterDraw: chart => {
                const ctx = chart.ctx;

                // Draw feasible region as filled polygon
                const fDsIdx = chart.data.datasets.findIndex(d => d.label === 'Feasible Region');
                if (fDsIdx !== -1) {
                  const fMeta = chart.getDatasetMeta(fDsIdx);
                  if (fMeta && fMeta.data && fMeta.data.length >= 3) {
                    ctx.save();
                    ctx.beginPath();
                    fMeta.data.forEach((pt, i) => { i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y); });
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(12, 56, 64, 0.12)';
                    ctx.fill();
                    ctx.restore();
                  }
                }

                const verticesMeta = chart.getDatasetMeta(chart.data.datasets.findIndex(d => d.label === 'Feasible Vertices'));
                if (!verticesMeta || !verticesMeta.data.length) return;
                ctx.save();
                ctx.font = 'bold 12px "IBM Plex Sans"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                verticesMeta.data.forEach((element, index) => {
                  ctx.fillStyle = optimalVertexIndices.includes(index) ? '#ff4d00' : '#2f6a73';
                  const label = String.fromCharCode(65 + index);
                  ctx.fillText(label, element.x, element.y - 5);
                });
                ctx.restore();
              },
            },
            responsive: true,
            maintainAspectRatio: false,
          }
        });
      }

      // --- Create Step 7: Find the Optimal Solution ---
      const step7Container = document.createElement('div');
      let step7HTML = `<h3 class="step-heading"><span class="step-num-badge">7</span> Optimal Solution</h3>`;

      if (optimalVertexIndices.length === 0) {
        step7HTML += `<p class="step-subtitle">There are no feasible vertices — no optimal solution exists for this problem.</p>`;
      } else if (optimalVertexIndices.length === 1) {
        const optimalIndex = optimalVertexIndices[0];
        const optimalVertex = feasibleVertices[optimalIndex];
        const vertexLetter = String.fromCharCode(65 + optimalIndex);
        const line1Index = optimalVertex.line1 - 1;
        const line2Index = optimalVertex.line2 - 1;
        const line1 = constraintsList[line1Index];
        const line2 = constraintsList[line2Index];

        step7HTML += `<p class="step-subtitle" style="margin-bottom:10px;">The optimal vertex is at <strong>Vertex ${vertexLetter}</strong>, the intersection of constraints (${line1Index + 1}) and (${line2Index + 1}). Solve the system simultaneously to find exact coordinates.</p>`;

        const systemEq1 = `${formatConstraint(line1, v1, v2).replace(/&le;|&ge;|≤|≥/g, '=')}`;
        const systemEq2 = `${formatConstraint(line2, v1, v2).replace(/&le;|&ge;|≤|≥/g, '=')}`;

        step7HTML += `<div class="derivation-box">
          <div class="derivation-description">System:</div>
          <div class="derivation-equation">${systemEq1}<br>${systemEq2}</div>
        </div>`;
        step7HTML += `<div class="derivation-box" style="margin-top: 10px;">
          <div class="derivation-description">Solution:</div>
          <div class="derivation-equation">${v1} = ${formatNumber(optimalVertex.x)}, &nbsp;&nbsp; ${v2} = ${formatNumber(optimalVertex.y)}</div>
        </div>`;

        step7HTML += `<p class="direction-text" style="margin-top: 12px;">
          Optimal point: <strong>(${formatNumber(optimalVertex.x)}, ${formatNumber(optimalVertex.y)})</strong>.
          Substituting into the objective function gives: <strong>${fnName} = ${formatNumber(optimalValue)}</strong>.
        </p>`;

      } else { // Multiple optimal solutions
        const vertex1Index = optimalVertexIndices[0];
        const vertex2Index = optimalVertexIndices[1];
        const vertex1Letter = String.fromCharCode(65 + vertex1Index);
        const vertex2Letter = String.fromCharCode(65 + vertex2Index);

        step7HTML += `<p class="step-subtitle">The contour line is parallel to the edge between <strong>Vertex ${vertex1Letter}</strong> and <strong>Vertex ${vertex2Letter}</strong> — every point on that segment is an optimal solution.</p>`;

        const optimalVertex1 = feasibleVertices[vertex1Index];
        const optimalVertex2 = feasibleVertices[vertex2Index];

        const summaryBox = `
          <div class="derivation-box" style="grid-template-columns: 1fr; gap: 10px;">
            <div><strong>Vertex ${vertex1Letter}:</strong> (${formatNumber(optimalVertex1.x)}, ${formatNumber(optimalVertex1.y)})</div>
            <div><strong>Vertex ${vertex2Letter}:</strong> (${formatNumber(optimalVertex2.x)}, ${formatNumber(optimalVertex2.y)})</div>
          </div>
        `;
        step7HTML += summaryBox;

        step7HTML += `<p class="direction-text" style="margin-top: 12px;">
          The ${mode} value for all points on this segment is <strong>${fnName} = ${formatNumber(optimalValue)}</strong>.
        </p>`;
      }

      step7Container.innerHTML = step7HTML;
      inequalitiesBreakdownDiv.appendChild(step7Container);
    }

    function updateSolutionSummary(solutionData) {
      if (!solutionData || !solutionData.optimalVertexIndices || solutionData.optimalVertexIndices.length === 0) {
        summaryCard.style.display = 'none';
        return;
      }

      const { feasibleVertices, optimalVertexIndices, optimalValue } = solutionData;
      const mode = document.querySelector('#optimization-mode-toggle .segmented-btn.active').dataset.mode;
      const fnName = objFnNameInput.value || 'T';

      let pointsHTML = '';
      if (optimalVertexIndices.length === 1) {
        const optimalVertex = feasibleVertices[optimalVertexIndices[0]];
        pointsHTML = `(${formatNumber(optimalVertex.x)}, ${formatNumber(optimalVertex.y)})`;
      } else {
        const vertex1Index = optimalVertexIndices[0];
        const vertex2Index = optimalVertexIndices[1];
        const vertex1Letter = String.fromCharCode(65 + vertex1Index);
        const vertex2Letter = String.fromCharCode(65 + vertex2Index);
        pointsHTML = `On segment ${vertex1Letter} to ${vertex2Letter}`;
      }

      summaryCard.innerHTML = `
        <div class="summary-item">
          <div class="label">Goal</div>
          <div class="value" style="text-transform: capitalize;">${mode}</div>
        </div>
        <div class="summary-item">
          <div class="label">Optimal Value</div>
          <div class="value">${fnName} = ${formatNumber(optimalValue)}</div>
        </div>
        <div class="summary-item">
          <div class="label">Optimal Point</div>
          <div class="value">${pointsHTML}</div>
        </div>`;
      summaryCard.style.display = 'flex';
    }

    function renderFeasibleRegionGraph(preserveZoom = false) {
      const lines = constraintsList.map(c => {
        return { c1: c.c1, c2: c.c2, rhs: c.rhs, sign: c.sign };
      });

      // Find all intersection points
      const intersectionPoints = [];
      for (let i = 0; i < lines.length; i++) {
        for (let j = i + 1; j < lines.length; j++) {
          const p1 = lines[i];
          const p2 = lines[j];

          const det = p1.c1 * p2.c2 - p2.c1 * p1.c2;
          if (det !== 0) { // If lines are not parallel
            const x = (p2.c2 * p1.rhs - p1.c2 * p2.rhs) / det;
            const y = (p1.c1 * p2.rhs - p2.c1 * p1.rhs) / det;
            if (x >= -1e-9 && y >= -1e-9) { // Only consider points in or very near the first quadrant
              intersectionPoints.push({ x, y, line1: i + 1, line2: j + 1 });
            }
          }
        }
      }

      // Find intercepts for scaling the chart
      const axisIntercepts = [];
      lines.forEach(l => {
        if (l.c1 !== 0) axisIntercepts.push({ x: l.rhs / l.c1, y: 0 });
        if (l.c2 !== 0) axisIntercepts.push({ x: 0, y: l.rhs / l.c2 });
      });

      // Filter for feasible vertices
      const feasibleVertices = intersectionPoints.filter(p => {
        return constraintsList.every(c => {
          const epsilon = 1e-9; // Tolerance for floating point inaccuracies
          return c.sign === 'le' ? (c.c1 * p.x + c.c2 * p.y <= c.rhs + epsilon) : (c.c1 * p.x + c.c2 * p.y >= c.rhs - epsilon);
        });
      });

      // Sort vertices to form a convex polygon
      if (feasibleVertices.length > 1) {
        const center = feasibleVertices.reduce((acc, p) => ({ x: acc.x + p.x, y: acc.y + p.y }), { x: 0, y: 0 });
        center.x /= feasibleVertices.length;
        center.y /= feasibleVertices.length;
        feasibleVertices.sort((a, b) => Math.atan2(a.y - center.y, a.x - center.x) - Math.atan2(b.y - center.y, b.x - center.x));
      }

      // --- Find Optimal Vertex ---
      let optimalVertexIndices = []; // Can be multiple if solutions are degenerate
      if (feasibleVertices.length > 0) {
        const a = parseFloat(objAInput.value) || 0;
        const b = parseFloat(objBInput.value) || 0;
        const c_offset = parseFloat(objCInput.value) || 0;
        const mode = document.querySelector('#optimization-mode-toggle .segmented-btn.active').dataset.mode;

        // First pass: calculate all objective values and find the single optimal value
        optimalValue = mode === 'maximize' ? -Infinity : Infinity;
        feasibleVertices.forEach(p => {
          const value = a * p.x + b * p.y + c_offset;
          p.objValue = value; // Store value for tooltip

          if (mode === 'maximize') {
            if (value > optimalValue) optimalValue = value;
          } else { // minimize
            if (value < optimalValue) optimalValue = value;
          }
        });

        // Second pass: find all vertices that match the optimal value (using a tolerance)
        const tolerance = 1e-9;
        feasibleVertices.forEach((p, index) => {
          if (Math.abs(p.objValue - optimalValue) < tolerance) {
            optimalVertexIndices.push(index);
          }
        });


      }


      // Determine chart axis limits
      const allPoints = [...feasibleVertices, ...axisIntercepts];
      const maxX = Math.max(10, ...allPoints.filter(p => p.x >= 0 && p.y >= 0).map(p => p.x));
      const maxY = Math.max(10, ...allPoints.filter(p => p.x >= 0 && p.y >= 0).map(p => p.y));

      // Calculate min values to show some negative space (e.g., 10% of the max value)
      const minX = -maxX * 0.1;
      const minY = -maxY * 0.1;


      // --- New Logic for Slider Range ---
      const a = parseFloat(objAInput.value) || 0;
      const b = parseFloat(objBInput.value) || 0;
      const c_offset = parseFloat(objCInput.value) || 0;

      // Calculate objective function values at each vertex to find the range
      const vertexValues = feasibleVertices.map(p => a * p.x + b * p.y + c_offset);

      // Also consider the value at the origin (0,0) and the max corner (maxX, maxY) to create a sensible range
      vertexValues.push(c_offset); // Value at (0,0)
      vertexValues.push(a * maxX + b * maxY + c_offset); // Value at (maxX, maxY)

      const minLevel = Math.min(...vertexValues);
      const maxLevel = Math.max(...vertexValues);

      // Update slider range and draw initial contour line
      updateSliderRange(minLevel, maxLevel);
      drawContourLine(minX, maxX, minY, maxY);

      // Prepare datasets for Chart.js
      const datasets = [];

      // 1. Feasible region polygon
      if (feasibleVertices.length > 0) {
        datasets.push({
          label: 'Feasible Region',
          data: [...feasibleVertices, feasibleVertices[0]], // Close the polygon
          fill: true,
          backgroundColor: 'rgba(12, 56, 64, 0.10)',
          borderColor: 'rgba(12, 56, 64, 0.28)',
          borderWidth: 3,
          showLine: true,
          type: 'line', // Use 'line' type for the dataset to enable filling
          pointRadius: 0, // No points on the polygon line itself
          order: 1 // Draw the region first
        });
      }

      // 2. Boundary lines
      if (visibilityState.boundaries) {
        lines.forEach((l, i) => {
          const linePoints = []; // Points to draw the boundary line
          const extendedMaxX = maxX * 1.1;
          const extendedMaxY = maxY * 1.1;

          if (l.c2 !== 0) { // Not a vertical line
            const yAtX0 = l.rhs / l.c2;
            const yAtXMax = (l.rhs - l.c1 * extendedMaxX) / l.c2;
            linePoints.push({ x: 0, y: yAtX0 });
            linePoints.push({ x: extendedMaxX, y: yAtXMax });
          } else if (l.c1 !== 0) { // Vertical line
            const x = l.rhs / l.c1;
            linePoints.push({ x: x, y: 0 });
            linePoints.push({ x: x, y: extendedMaxY });
          } // else it's 0=0, which can't be drawn

          datasets.push({
            label: `Constraint (${i + 1})`,
            data: linePoints,
            borderColor: 'rgba(100, 116, 139, 0.5)', // Lighter, grayish color
            borderWidth: 1,
            borderDash: [6, 3], // Dashed line effect
            showLine: true,
            pointRadius: 0,
            type: 'line',
            fill: false,
            order: 2 // Draw boundaries over the region
          });
        });
      }

      // 3. Feasible vertices points
      if (visibilityState.vertices) {
        datasets.push({
          label: 'Feasible Vertices',
          data: feasibleVertices,
          backgroundColor: feasibleVertices.map((_, i) => optimalVertexIndices.includes(i) ? '#ff4d00' : '#83acb2'),
          borderColor: feasibleVertices.map((_, i) => optimalVertexIndices.includes(i) ? '#cc3d00' : '#2f6a73'),
          borderWidth: 1.5,
          pointRadius: feasibleVertices.map((_, i) => optimalVertexIndices.includes(i) ? 8 : 5), // Larger radius for optimal
          pointHoverRadius: feasibleVertices.map((_, i) => optimalVertexIndices.includes(i) ? 10 : 7),
          pointStyle: 'circle', 
          order: 5, // Draw vertices on top of everything
          type: 'scatter',
        });
      }

      // Define tooltip callbacks here to capture the correct optimalVertexIndices
      const tooltipCallbacks = {
        callbacks: {
          label: function(context) {
            const datasetLabel = context.dataset.label || '';

            // Custom tooltip for Vertices
            if (datasetLabel === 'Feasible Vertices') {
              const point = context.raw; // The original data object
              const isOptimal = optimalVertexIndices.includes(context.dataIndex);
              const vertexLabel = `${isOptimal ? 'Optimal ' : ''}Vertex ${String.fromCharCode(65 + context.dataIndex)}`;
              const coords = `(${formatNumber(point.x)}, ${formatNumber(point.y)})`;
              const intersection = `Intersection of lines (${point.line1}) and (${point.line2})`; 
              const fnName = objFnNameInput.value || 'T';
              const objValue = `${fnName} = ${formatNumber(point.objValue)}`;
              return [vertexLabel, coords, intersection, objValue]; // Return array for multi-line tooltip
            }
            // Simple label for other lines
            if (datasetLabel.startsWith('Constraint')) return datasetLabel;
            return `${datasetLabel}: (${context.parsed.x.toFixed(2)}, ${context.parsed.y.toFixed(2)})`;
          }
        }
      };
      // Create or update the chart
      if (feasibleRegionChart) {
        feasibleRegionChart.data.datasets = datasets;
        feasibleRegionChart.options.scales.x.title.text = toSubscript(var1Input.value);
        feasibleRegionChart.options.scales.y.title.text = toSubscript(var2Input.value);
        feasibleRegionChart.options.scales.x.title.font.size = 16;
        feasibleRegionChart.options.scales.y.title.font.size = 16;
        if (!preserveZoom) {
          feasibleRegionChart.options.scales.x.max = maxX * 1.1; // Keep this line
          feasibleRegionChart.options.scales.x.min = minX;
          feasibleRegionChart.options.scales.y.max = maxY * 1.1;
          feasibleRegionChart.options.scales.y.min = minY;
        }
        feasibleRegionChart.options.plugins.tooltip = tooltipCallbacks;
        feasibleRegionChart.update('none'); // Use 'none' for a smoother update
      } else {
        feasibleRegionChart = new Chart(chartCanvas, {
          type: 'scatter', // Set the main chart type to 'scatter'
          data: { datasets },
          options: {
            scales: {
              x: {
                type: 'linear',
                position: 'bottom',
                min: minX,
                max: maxX * 1.1,
                title: {
                  display: true,
                  text: toSubscript(var1Input.value),
                  font: {
                    size: 16
                  }
                },
                grid: {
                  z: -1, // Draw grid lines behind datasets
                  lineWidth: (context) => (context.tick.value === 0 ? 1.5 : 1), // Bolder line for the axis
                  color: (context) => (context.tick.value === 0 ? 'rgba(0, 0, 0, 0.5)' : 'rgba(0, 0, 0, 0.05)'), // More transparent grid
                },
                ticks: {
                  callback: function(value) {
                    return formatNumber(value);
                  }
                }
              },
              y: {
                min: minY,
                max: maxY * 1.1,
                title: {
                  display: true,
                  text: toSubscript(var2Input.value),
                  font: {
                    size: 16
                  }
                },
                grid: {
                  z: -1, // Draw grid lines behind datasets
                  lineWidth: (context) => (context.tick.value === 0 ? 1.5 : 1), // Bolder line for the axis
                  color: (context) => (context.tick.value === 0 ? 'rgba(0, 0, 0, 0.5)' : 'rgba(0, 0, 0, 0.05)'), // More transparent grid
                },
                ticks: {
                  callback: function(value) {
                    return formatNumber(value);
                  }
                }
              }
            },
            plugins: {
              zoom: {
                pan: {
                  enabled: true,
                  mode: 'xy',
                  onPanComplete: ({chart}) => { updateSliderRangeForVisibleArea(chart); chart.update('none'); } // Redraw contour on pan
                },
                zoom: {
                  wheel: {
                    enabled: true,
                    speed: 0.02,
                  },
                  pinch: {
                    enabled: true
                  },
                  mode: 'xy',
                  onZoomComplete: ({chart}) => { updateSliderRangeForVisibleArea(chart); chart.update('none'); } // Redraw contour on zoom
                },
                limits: {
                  x: {min: minX},
                  y: {min: minY}
                }
              },
              // Custom plugin: polygon fill + vertex labels
              afterDraw: chart => {
                const ctx = chart.ctx;

                // Draw feasible region as filled polygon
                const fDsIdx = chart.data.datasets.findIndex(d => d.label === 'Feasible Region');
                if (fDsIdx !== -1) {
                  const fMeta = chart.getDatasetMeta(fDsIdx);
                  if (fMeta && fMeta.data && fMeta.data.length >= 3) {
                    ctx.save();
                    ctx.beginPath();
                    fMeta.data.forEach((pt, i) => { i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y); });
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(12, 56, 64, 0.12)';
                    ctx.fill();
                    ctx.restore();
                  }
                }

                const verticesMeta = chart.getDatasetMeta(chart.data.datasets.findIndex(d => d.label === 'Feasible Vertices'));
                if (!verticesMeta) return;

                ctx.font = 'bold 14px Lato';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';

                verticesMeta.data.forEach((element, index) => {
                  ctx.fillStyle = optimalVertexIndices.includes(index) ? '#ff4d00' : '#2f6a73';
                  const label = String.fromCharCode(65 + index);
                  ctx.fillText(label, element.x, element.y - 5);
                });
              },
              legend: { display: false },
              tooltip: tooltipCallbacks
            },
            responsive: true,
            maintainAspectRatio: false,
          }
        });
      }

      const solutionData = { feasibleVertices, optimalVertexIndices, optimalValue };

      renderStaticFeasibleRegionGraph({ datasets, minX, maxX, minY, maxY, solutionData });

      // Return the calculated solution so it can be used in the breakdown steps
      return { ...solutionData, datasets, minX, maxX, minY, maxY };
    }

    function updateSliderRangeForVisibleArea(chart) {
      if (!chart) return;

      const { min: minX, max: maxX } = chart.scales.x;
      const { min: minY, max: maxY } = chart.scales.y;

      const a = parseFloat(objAInput.value) || 0;
      const b = parseFloat(objBInput.value) || 0;
      const c_offset = parseFloat(objCInput.value) || 0;

      // Calculate the objective function value at the four corners of the visible area
      const cornerValues = [
        a * minX + b * minY + c_offset,
        a * minX + b * maxY + c_offset,
        a * maxX + b * minY + c_offset,
        a * maxX + b * maxY + c_offset,
      ];

      const minLevel = Math.min(...cornerValues);
      const maxLevel = Math.max(...cornerValues);

      updateSliderRange(minLevel, maxLevel);
    }

    function updateSliderRange(min, max) {
      // Set the slider range based on the min/max values of the objective function
      levelSlider.min = min;
      const effectiveMax = (min === max) ? max + 100 : max; // Avoid a zero-width range
      levelSlider.max = effectiveMax;

      // Dynamically calculate a reasonable step for the slider
      const range = effectiveMax - min;
      let step = 1;
      if (range > 0) {
        // Aim for about 100-200 steps. We calculate a "nice" step value
        // based on the order of magnitude of the range.
        const powerOf10 = Math.pow(10, Math.floor(Math.log10(range)) - 2);
        step = Math.max(powerOf10, 0.01); // Set a minimum step to avoid issues with very small ranges
      }
      levelSlider.step = step;

      const midValue = (parseFloat(levelSlider.min) + parseFloat(levelSlider.max)) / 2;
      levelSlider.value = midValue;
      // Also update the displayed value
      document.getElementById('level-value').textContent = formatNumber(midValue);
      updateSliderFill(levelSlider);
    }

    function updateSliderFill(slider) {
      const min = parseFloat(slider.min);
      const max = parseFloat(slider.max);
      const value = parseFloat(slider.value);
      const percentage = max > min ? ((value - min) / (max - min)) * 100 : 50;
      slider.style.setProperty('--progress', `${percentage}%`);
    }

    function drawContourLine(minX, maxX, minY, maxY) { 
      if (!feasibleRegionChart) return;

      const a = parseFloat(document.getElementById('obj-a').value) || 0;
      const b = parseFloat(document.getElementById('obj-b').value) || 0;
      const c = parseFloat(document.getElementById('obj-c').value) || 0;
      const level = parseFloat(levelSlider.value);
      document.getElementById('level-value').textContent = formatNumber(level);
      updateSliderFill(levelSlider);

      // Find and remove the old contour line first
      const contourIndex = feasibleRegionChart.data.datasets.findIndex(d => d.label === 'Contour Line');
      if (contourIndex !== -1) {
        feasibleRegionChart.data.datasets.splice(contourIndex, 1);
      }
      if (!visibilityState.contour) { feasibleRegionChart.update('none'); return; }

      const contourPoints = [];

      if (b !== 0) {
        const slope = -a / b;
        const intercept = (level - c) / b;
        contourPoints.push({ x: minX, y: slope * minX + intercept });
        contourPoints.push({ x: maxX, y: slope * maxX + intercept });
      } else if (a !== 0) { // Vertical line
        const x_val = (level - c) / a;
        contourPoints.push({ x: x_val, y: minY });
        contourPoints.push({ x: x_val, y: maxY });
      }

      const contourDataset = {
        label: 'Contour Line',
        data: contourPoints,
        borderColor: '#ff4d00',
        borderWidth: 2,
        type: 'line',
        pointRadius: 0,
        order: 4, // Draw contour on top of boundaries
      };

      feasibleRegionChart.data.datasets.push(contourDataset);
      feasibleRegionChart.update('none');
    }

    function renderStaticFeasibleRegionGraph(chartData) {
      const { datasets, minX, maxX, minY, maxY, solutionData } = chartData;
      const staticChartCanvas = document.getElementById('staticFeasibleRegionChart');
      if (!staticChartCanvas) return;

      const staticDatasets = JSON.parse(JSON.stringify(datasets)).filter(d => d.label !== 'Contour Line');

      // Step 3 shows the feasible set only — no optimal point distinction
      const verticesDs = staticDatasets.find(d => d.label === 'Feasible Vertices');
      if (verticesDs) {
        const n = verticesDs.data.length;
        verticesDs.backgroundColor = Array(n).fill('#83acb2');
        verticesDs.borderColor = Array(n).fill('#2f6a73');
        verticesDs.pointRadius = Array(n).fill(5);
        verticesDs.pointHoverRadius = Array(n).fill(7);
      }

      if (staticFeasibleRegionChart) {
        staticFeasibleRegionChart.data.datasets = staticDatasets;
        staticFeasibleRegionChart.options.scales.x.title.text = toSubscript(var1Input.value);
        staticFeasibleRegionChart.options.scales.y.title.text = toSubscript(var2Input.value);
        staticFeasibleRegionChart.options.scales.x.max = maxX * 1.1;
        staticFeasibleRegionChart.options.scales.x.min = minX;
        staticFeasibleRegionChart.options.scales.y.max = maxY * 1.1;
        staticFeasibleRegionChart.options.scales.y.min = minY;
        staticFeasibleRegionChart.update('none');
      } else {
        staticFeasibleRegionChart = new Chart(staticChartCanvas, {
          type: 'scatter',
          data: { datasets: staticDatasets },
          options: {
            scales: {
              x: {
                type: 'linear', position: 'bottom', min: minX, max: maxX * 1.1,
                title: { display: true, text: toSubscript(var1Input.value), font: { size: 14 } },
                grid: {
                  lineWidth: (context) => (context.tick.value === 0 ? 1.5 : 1),
                  color: (context) => (context.tick.value === 0 ? 'rgba(0, 0, 0, 0.5)' : 'rgba(0, 0, 0, 0.05)'),
                },
                ticks: { callback: (value) => formatNumber(value), font: { size: 10 } }
              },
              y: {
                min: minY, max: maxY * 1.1,
                title: { display: true, text: toSubscript(var2Input.value), font: { size: 14 } },
                grid: {
                  lineWidth: (context) => (context.tick.value === 0 ? 1.5 : 1),
                  color: (context) => (context.tick.value === 0 ? 'rgba(0, 0, 0, 0.5)' : 'rgba(0, 0, 0, 0.05)'),
                },
                ticks: { callback: (value) => formatNumber(value), font: { size: 10 } }
              }
            },
            plugins: {
              zoom: { zoom: { wheel: { enabled: false } }, pan: { enabled: false } }, // Disable zoom/pan
              legend: { display: false },
              tooltip: { enabled: false }, // Disable tooltips
              afterDraw: chart => {
                const ctx = chart.ctx;

                // Draw feasible region as filled polygon
                const fDsIdx = chart.data.datasets.findIndex(d => d.label === 'Feasible Region');
                if (fDsIdx !== -1) {
                  const fMeta = chart.getDatasetMeta(fDsIdx);
                  if (fMeta && fMeta.data && fMeta.data.length >= 3) {
                    ctx.save();
                    ctx.beginPath();
                    fMeta.data.forEach((pt, i) => { i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y); });
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(12, 56, 64, 0.12)';
                    ctx.fill();
                    ctx.restore();
                  }
                }

                const verticesMeta = chart.getDatasetMeta(chart.data.datasets.findIndex(d => d.label === 'Feasible Vertices'));
                const optimalVertexIndices = solutionData ? solutionData.optimalVertexIndices : [];
                if (!verticesMeta || !verticesMeta.data.length) return;

                ctx.save();
                ctx.font = 'bold 12px "IBM Plex Sans"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';

                verticesMeta.data.forEach((element, index) => {
                  ctx.fillStyle = '#2f6a73';
                  const label = String.fromCharCode(65 + index);
                  ctx.fillText(label, element.x, element.y - 5);
                });
                ctx.restore();
              },
            },
            responsive: true,
            maintainAspectRatio: false,
          }
        });
      }
    }

    async function loadExercise(id) {
      try {
        const response = await fetch('exercises.json');
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        const exercises = await response.json();
        const exercise = exercises[id];

        if (exercise) {
          // Clear current state
          constraintsList = [];
          document.getElementById('current-exercise-display').textContent = `Exercise ${id}`;

          // Animate in the new settings

          var1Input.value = exercise.variables.var1;
          var2Input.value = exercise.variables.var2;
          objFnNameInput.value = exercise.target.name || 'T';

          objAInput.value = exercise.target.a;
          objBInput.value = exercise.target.b;
          objCInput.value = exercise.target.c;
          
          optimizationModeToggle.querySelectorAll('.segmented-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === exercise.target.mode);
          });

          // Load all constraints at once
          constraintsList = exercise.constraints.map(c => ({ ...c, type: 'editable' }));
          renderConstraints();

        } else {
          alert(`Exercise ${id} not found in exercises.json`);
        }
      } catch (error) {
        console.error("Could not load exercises:", error);
        alert("Failed to load exercises.json. Please check the file and the console for errors.");
      }
      step2Div.classList.add('collapsed'); // Start collapsed
    }

    function formatConstraint(c, v1, v2) {
        if (c.type === 'base') {
            return c.text.replace(/\{\{v1\}\}/g, v1).replace(/\{\{v2\}\}/g, v2);
        }

        const terms = [];
        if (c.c1 !== 0) {
            if (c.c1 === 1) terms.push(`1&middot;${v1}`);
            else if (c.c1 === -1) terms.push(`-1&middot;${v1}`);
            else terms.push(`${formatNumber(c.c1)}&middot;${v1}`);
        }

        if (c.c2 !== 0) {
            if (terms.length > 0 && c.c2 > 0) terms.push('+');
            if (c.c2 === 1) terms.push(`1&middot;${v2}`);
            else if (c.c2 === -1) terms.push(`-1&middot;${v2}`);
            else terms.push(`${formatNumber(c.c2)}&middot;${v2}`);
        }

        if (terms.length === 0) {
            terms.push('0');
        }

        const sign = c.sign === 'le' ? '&le;' : '&ge;';
        return `${terms.join(' ')} ${sign} ${c.rhs}`;
    }

    addBtn.addEventListener("click", () => {
      constraintsList.push({ c1: 1, c2: 1, rhs: 10, type: 'editable', sign: 'le' });
      document.getElementById('current-exercise-display').textContent = '';
      renderConstraints();
    });

    function handleInputChange(fullRender = true) {
        document.getElementById('current-exercise-display').textContent = '';
        if (fullRender) renderConstraints();
    }

    var1Input.addEventListener("change", handleInputChange);
    var2Input.addEventListener("change", handleInputChange);

    objFnNameInput.addEventListener("change", handleInputChange);
    objAInput.addEventListener("change", handleInputChange);
    objBInput.addEventListener("change", handleInputChange);
    objCInput.addEventListener("change", handleInputChange);

    levelSlider.addEventListener('input', () => {
      if (!feasibleRegionChart) return;

      // If contour is not visible, turn it on when the user starts sliding
      if (!visibilityState.contour) {
        visibilityState.contour = true;
        const contourBtn = document.querySelector('.chart-toggle-btn[data-target="contour"]');
        if (contourBtn) contourBtn.classList.add('active');
      }

      const minX = feasibleRegionChart.options.scales.x.min;
      const maxX = feasibleRegionChart.options.scales.x.max;
      const minY = feasibleRegionChart.options.scales.y.min;
      const maxY = feasibleRegionChart.options.scales.y.max;
      drawContourLine(minX, maxX, minY, maxY);
    });

    var1Input.addEventListener("change", renderConstraints);
    var2Input.addEventListener("change", renderConstraints);


    function loadDefaultState() {
      document.getElementById('current-exercise-display').textContent = '';

      // Set default variable names
      var1Input.value = 'x';
      var2Input.value = 'y';
      objFnNameInput.value = 'T';

      // Set default target function coefficients
      objAInput.value = 1;
      objBInput.value = 1;
      objCInput.value = 0;

      // Set default optimization mode to maximize
      optimizationModeToggle.querySelectorAll('.segmented-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === 'maximize');
      });

      // Set default constraints (x >= 0 and y >= 0)
      constraintsList = [
        { c1: 1, c2: 0, rhs: 0, sign: 'ge', type: 'base', text: '{{v1}} ≥ 0' },
        { c1: 0, c2: 1, rhs: 0, sign: 'ge', type: 'base', text: '{{v2}} ≥ 0' }
      ];
      renderConstraints();
    }

    // Load the default state on page load
    loadDefaultState();
  </script>
